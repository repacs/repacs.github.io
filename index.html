<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Würfel - Platziere einen Würfel</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 10;
            font-size: 14px;
            pointer-events: none;
        }

        /* NEU: Flexibel zentriert via left: 50% und höher gesetzt (bottom: 100px) */
    </style>
</head>
<body>
    <div id="info">
        🎯 AR Würfel App
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="/src/index.js"></script>
</body>
</html>
